<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Liste des bons de livraison</title>
    <th:block th:insert="~{fragment/load_css :: load_css}"></th:block>
    <th:block th:insert="~{fragment/font :: font}"></th:block>
    <th:block th:insert="~{fragment/load_script :: load_script}"></th:block>
</head>
<body>
<div th:replace="~{fragment/sidebar :: sidebar}"></div>
<div class="main-content">
    <section>
        <div th:replace="~{fragment/load_pop_up :: pop_up}"></div>
        <!-- En-tête avec icônes en dégradé bleu -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-gradient-blue">
                <i class="fas fa-clipboard-list icon-gradient-blue"></i> Liste des bons de livraison
            </h1>
            <div>
                <a th:href="@{/bonlivraison/add}" sec:authorize="hasAnyRole('ADMIN','MOYENS_GENERAUX')" class="btn btn-gradient-green">
                    <i class="fas fa-plus-circle me-1"></i> Nouvel bon de livraison
                </a>
            </div>
        </div>

        <!-- Carte contenant le tableau -->
        <div class="card shadow-lg border-0">
            <div class="card-body">
                <form method="get" th:action="@{/bonlivraison/list}" class="row g-2 align-items-end mb-3">
                    <input type="hidden" name="sort" th:value="${sort}">
                    <input type="hidden" name="dir" th:value="${dir}">

                    <!-- Recherche -->
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input class="form-control" type="text" name="q"
                                   th:value="${q}" placeholder="Rechercher (N° BL, fournisseur, devise)..." />
                        </div>
                    </div>

                    <!-- Date début -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">
                            Date début
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-calendar"></i></span>
                            <input class="form-control" type="date" name="dateFrom" th:value="${dateFrom}">
                        </div>
                    </div>

                    <!-- Date fin -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">
                            Date fin
                        </label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-calendar-check"></i></span>
                            <input class="form-control" type="date" name="dateTo" th:value="${dateTo}">
                        </div>
                    </div>

                    <!-- Taille -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">
                            <i class="fas fa-list-ol me-1"></i> Taille
                        </label>
                        <select class="form-select" name="size" onchange="this.form.submit()">
                            <option th:value="10" th:selected="${size == 10}">10</option>
                            <option th:value="25" th:selected="${size == 25}">25</option>
                            <option th:value="50" th:selected="${size == 50}">50</option>
                            <option th:value="100" th:selected="${size == 100}">100</option>
                        </select>
                    </div>

                    <!-- Boutons -->
                    <div class="col-md-1">
                        <label class="form-label mb-1 d-none d-md-block">&nbsp;</label>
                        <button class="btn btn-gradient-blue w-100" type="submit" title="Filtrer">
                            <i class="fas fa-filter"></i>
                        </button>
                    </div>

                    <div class="col-md-1">
                        <label class="form-label mb-1 d-none d-md-block">&nbsp;</label>
                        <a class="btn btn-outline-secondary w-100" th:href="@{/bonlivraison/list}" title="Réinitialiser">
                            Réinitialiser
                        </a>
                    </div>
                </form>

                <div class="table-responsive">
                    <table id="bonLivraisonTable" class="table table-striped table-hover table-bordered dt-head-gradient">
                    <thead>
                        <tr>
                            <!-- Tri sur id -->
                            <th>
                                <a class="text-decoration-none text-dark"
                                   th:href="@{/bonlivraison/list(page=${p},size=${size},q=${q},dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}">
                                <i class="fas fa-hashtag me-2 icon-gradient-light-blue"></i>N° Bon de Livraison
                                </a>
                            </th>

                            <th>
                                <i class="fas fa-building me-2 icon-gradient-light-blue"></i>Fournisseur
                            </th>

                            <!-- Tri sur dateReception -->
                            <th>
                                <a class="text-decoration-none text-dark"
                                   th:href="@{/bonlivraison/list(page=${p},size=${size},q=${q},dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}">
                                    <i class="far fa-clock me-2 icon-gradient-light-blue"></i>Date
                                </a>
                            </th>

                            <th>
                                <i class="fas fa-coins me-2 icon-gradient-light-blue"></i>Devise
                            </th>

                            <th class="text-center">
                                <i class="fas fa-cogs me-2 icon-gradient-light-blue"></i>Actions
                            </th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="bl : ${bonLivraisonMeres.content}">
                            <td th:text="${bl.id}"></td>
                            <td th:text="${bl.fournisseur.nom}"></td>
                            <td th:text="${#temporals.format(bl.dateReception, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${bl.devise.designation +' ('+bl.devise.acronyme + ')'}"></td>
                            <td class="text-center">
                                <button type="button"
                                        class="btn btn-sm btn-view-bl"
                                        data-bs-toggle="modal"
                                        data-bs-target="#bonLivraisonModal"
                                        th:data-id="${bl.id}"
                                        title="Voir le bon de livraison">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                        </tr>

                        <tr th:if="${bonLivraisonMeres.totalElements == 0}">
                            <td colspan="5" class="text-center text-muted py-4">
                                Aucun bon de livraison trouvé
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <nav th:if="${bonLivraisonMeres.totalPages > 1}" aria-label="Pagination BL" class="mt-3 dt-pagination stock-pagination">
                    <ul class="pagination justify-content-center">

                        <li class="page-item" th:classappend="${bonLivraisonMeres.first} ? ' disabled' : ''">
                            <a class="page-link"
                               th:href="@{/bonlivraison/list(page=${p},size=${size},q=${q},dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}">
                                &laquo;
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="p : ${#numbers.sequence(0, bonLivraisonMeres.totalPages - 1)}"
                            th:if="${p >= bonLivraisonMeres.number - 2 and p <= bonLivraisonMeres.number + 2}"
                            th:classappend="${p == bonLivraisonMeres.number} ? ' active' : ''">
                            <a class="page-link"
                               th:href="@{/bonlivraison/list(page=${p},size=${size},q=${q},dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}"
                               th:text="${p + 1}"></a>
                        </li>

                        <li class="page-item" th:classappend="${bonLivraisonMeres.last} ? ' disabled' : ''">
                            <a class="page-link"
                               th:href="@{/bonlivraison/list(page=${p},size=${size},q=${q},dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}">
                                &raquo;
                            </a>
                        </li>

                    </ul>

                    <div class="text-center text-muted small">
                        Page <span th:text="${bonLivraisonMeres.number + 1}"></span> /
                        <span th:text="${bonLivraisonMeres.totalPages}"></span>
                    </div>
                </nav>

            </div>
        </div>
    </section>
</div>

<div class="modal fade" id="bonLivraisonModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content bl-document">

            <!-- EN-TÊTE DOCUMENT -->
            <div class="bl-header">
                <div class="bl-company">
                    <img th:src="@{/img/logo_afg.png}" alt="Logo" height="60">
<!--                    <small>Adresse – Téléphone – Email</small>-->
                </div>
                <div class="bl-title">
                    <h3>BON DE LIVRAISON</h3>
                    <span>Réference : <strong id="modalBlId"></strong></span>
                </div>
            </div>

            <!-- INFOS GÉNÉRALES -->
            <div class="bl-infos">
                <div>
                    <strong>Fournisseur :</strong>
                    <div id="modalBlFournisseur"></div>
                </div>
                <div>
                    <strong>Date :</strong>
                    <div id="modalBlDate"></div>
                </div>
                <div>
                    <strong>Devise :</strong>
                    <div id="modalBlDevise"></div>
                </div>
            </div>

            <!-- TABLE ARTICLES -->
            <div class="bl-body">
                <table class="bl-table">
                    <thead>
                    <tr>
                        <th style="width: 70%">DÉSIGNATION</th>
                        <th style="width: 30%" class="text-end">QUANTITÉ</th>
                    </tr>
                    </thead>
                    <tbody id="modalBlArticles">
                    <tr>
                        <td colspan="2" class="text-center text-muted">
                            Chargement...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- SIGNATURES -->
<!--            <div class="bl-signatures">-->
<!--                <div>-->
<!--                    <strong>Livré par</strong>-->
<!--                    <div class="signature-box"></div>-->
<!--                </div>-->
<!--                <div>-->
<!--                    <strong>Reçu par</strong>-->
<!--                    <div class="signature-box"></div>-->
<!--                </div>-->
<!--            </div>-->

            <!-- FOOTER -->
            <div class="modal-footer bl-footer">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
                    Fermer
                </button>
<!--                <button class="btn btn-primary" onclick="window.print()">-->
<!--                    <i class="fas fa-print me-1"></i>Imprimer-->
<!--                </button>-->
            </div>

        </div>
    </div>
</div>


<script th:inline="none">
    /*<![CDATA[*/
    const formatQuantite = new Intl.NumberFormat('fr-FR', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
    });
    document.addEventListener('DOMContentLoaded', () => {
        // Fonction pour ouvrir le modal et charger les données
        $('#bonLivraisonTable').on('click', '.btn-view-bl', function () {
            const blId = $(this).data('id');

            // Réinitialiser le contenu
            $('#modalBlId').text(blId);
            $('#modalBlFournisseur').text('');
            $('#modalBlDate').text('');
            $('#modalBlDevise').text('');
            $('#modalBlArticles').html('<tr><td colspan="2" class="text-center text-muted">Chargement...</td></tr>');

            // Appel AJAX
            $.ajax({
                url: '/api/bonlivraison/' + blId + '/details',
                method: 'GET',
                success: function (data) {
                    // Infos générales
                    $('#modalBlId').text(data.id);
                    $('#modalBlFournisseur').text(data.fournisseur);
                    // Formatage de la date
                    if(data.date) {
                        const dateObj = new Date(data.date);
                        const day = String(dateObj.getDate()).padStart(2, '0');
                        const month = String(dateObj.getMonth() + 1).padStart(2, '0'); // Mois de 0 à 11
                        const year = dateObj.getFullYear();
                        const hours = String(dateObj.getHours()).padStart(2, '0');
                        const minutes = String(dateObj.getMinutes()).padStart(2, '0');

                        $('#modalBlDate').text(`${day}/${month}/${year} ${hours}:${minutes}`);
                    }
                    $('#modalBlDevise').text(data.devise);

                    // Articles
                    if (data.articles && data.articles.length > 0) {
                        let rows = '';
                        data.articles.forEach(a => {
                            const qte = Number(
                                String(a.quantite)
                                    .replace(/\s/g, '')
                                    .replace(',', '.')
                            );

                            rows += `<tr>
        <td>${a.designation}</td>
        <td class="text-end">${formatQuantite.format(qte)}</td>
    </tr>`;
                        });
                        $('#modalBlArticles').html(rows);
                    } else {
                        $('#modalBlArticles').html('<tr><td colspan="2" class="text-center text-muted">Aucun article</td></tr>');
                    }
                },
                error: function () {
                    $('#modalBlArticles').html('<tr><td colspan="2" class="text-center text-danger">Erreur de chargement</td></tr>');
                }
            });
        });
    });


    /*]]>*/
</script>
</body>
</html>
