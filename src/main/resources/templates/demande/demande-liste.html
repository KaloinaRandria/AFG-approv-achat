<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Liste des demandes</title>
    <th:block th:insert="~{fragment/load_css :: load_css}"></th:block>
    <th:block th:insert="~{fragment/font :: font}"></th:block>
    <th:block th:insert="~{fragment/load_script :: load_script}"></th:block>
    <style>

    </style>
</head>
<body>
<div th:replace="~{fragment/sidebar :: sidebar}"></div>

<div class="main-content">
    <section>
        <div th:replace="~{fragment/load_pop_up :: pop_up}"></div>

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-gradient-blue">
                <i class="fas fa-list-ul icon-gradient-blue"></i> Liste des demandes
            </h1>
            <div>
                <a th:href="@{/demande/add}" class="btn btn-gradient-green">
                    <i class="fas fa-plus-circle me-1"></i> Nouvelle demande
                </a>
            </div>
        </div>

        <div class="card shadow-lg border-0 mb-3">
            <div class="card-body">

                <form method="get" th:action="@{/demande/list}" class="row g-2 align-items-end">
                    <input type="hidden" name="sort" th:value="${sort}">
                    <input type="hidden" name="dir" th:value="${dir}">

                    <!-- N° demande -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">N° demande</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-hashtag"></i></span>
                            <input class="form-control" type="text" name="num"
                                   th:value="${num}" placeholder="DM..." />
                        </div>
                    </div>

                    <!-- Demandeur -->
                    <div class="col-md-3">
                        <label class="form-label mb-1">Demandeur</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-user"></i></span>
                            <input class="form-control" type="text" name="demandeur"
                                   th:value="${demandeur}" placeholder="Nom / Prénom ..." />
                        </div>
                    </div>

                    <!-- Type -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Type</label>
                        <select class="form-select" name="type">
                            <option value="" th:selected="${type == null || type == ''}">Tous</option>
                            <option value="OPEX" th:selected="${type == 'OPEX'}">OPEX</option>
                            <option value="CAPEX" th:selected="${type == 'CAPEX'}">CAPEX</option>
                        </select>
                    </div>


                    <!-- Statut -->
                    <div class="col-md-2">
                    <label class="form-label mb-1">Statut</label>
                        <select class="form-select" name="statut">
                            <option value="0" th:selected="${statut == null || statut == 0}">Tous</option>

                            <th:block th:if="${statutFiltre != null}">
                                <option th:each="entry : ${statutFiltre.entrySet()}"
                                        th:value="${entry.key}"
                                        th:text="${entry.value}"
                                        th:selected="${statut != null && statut == entry.key}">
                                </option>
                            </th:block>
                        </select>
                    </div>

                    <!-- Priorité -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Priorité</label>
                        <select class="form-select" name="priorite">
                            <option value="" th:selected="${priorite == null || priorite == ''}">Toutes</option>

                            <th:block th:if="${prioriteFiltre != null}">
                                <option th:each="entry : ${prioriteFiltre.entrySet()}"
                                        th:value="${entry.key}"
                                        th:text="${entry.value}"
                                        th:selected="${priorite != null && priorite == entry.key}">
                                </option>
                            </th:block>
                        </select>
                    </div>




                    <!-- Taille (⚠️ pas d'auto-submit si tu veux appliquer avec Filtrer) -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">
                            <i class="fas fa-list-ol me-1"></i> Taille
                        </label>
                        <select class="form-select" name="size">
                            <option th:value="10" th:selected="${size == 10}">10</option>
                            <option th:value="25" th:selected="${size == 25}">25</option>
                            <option th:value="50" th:selected="${size == 50}">50</option>
                            <option th:value="100" th:selected="${size == 100}">100</option>
                        </select>
                    </div>

                    <!-- Date début -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Date début</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-calendar"></i></span>
                            <input class="form-control" type="date" name="dateFrom" th:value="${dateFrom}">
                        </div>
                    </div>

                    <!-- Date fin -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Date fin</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-calendar-check"></i></span>
                            <input class="form-control" type="date" name="dateTo" th:value="${dateTo}">
                        </div>
                    </div>

                    <!-- Portée -->
                    <div class="col-md-2" th:if="${showDemandeurScopeFilter}">
                        <label class="form-label mb-1">
                            <i class="fas fa-users me-1"></i> Portée
                        </label>
                        <select class="form-select" name="scope">
                            <option value="ALL" th:selected="${scope == 'ALL'}">Tous</option>
                            <option value="ME" th:selected="${scope == 'ME'}">Mes demandes</option>
                            <option value="CHILDREN" th:selected="${scope == 'CHILDREN'}">Mes enfants</option>
                        </select>
                    </div>



                    <!-- Boutons -->
                    <div class="col-md-12 d-flex gap-2 mt-2">
<!--                        <label class="form-label mb-1 d-none d-md-block">&nbsp;</label>-->
                        <button class="btn btn-gradient-blue" type="submit" title="Filtrer">
                            <i class="fas fa-filter me-1"></i>Filtrer
                        </button>
                        <a class="btn btn-outline-secondary" th:href="@{/demande/list}" title="Réinitialiser">
                            Réinitialiser
                        </a>
                    </div>

<!--                    <div class="col-md-1">-->
<!--                        <label class="form-label mb-1 d-none d-md-block">&nbsp;</label>-->
<!--                        -->
<!--                    </div>-->
                </form>

            </div>
        </div>

        <!-- CARD TABLEAU -->
        <div class="card shadow-lg border-0">
            <div class="card-body">

                <!-- total -->
                <div class="text-end text-muted small mb-2">
                    <span th:text="${demandesMeres.totalElements}"></span> ligne(s)
                </div>

                <!-- Tableau -->
                <div class="table-responsive">
                    <table id="demandeTable" class="table table-striped table-hover table-bordered dt-head-gradient">
                        <thead>
                        <tr>
                            <!-- Tri ID -->
                            <th>
                                <a class="text-decoration-none text-dark"
                                   th:href="@{/demande/list(page=0,size=${size},
                                    num=${num},demandeur=${demandeur},type=${type},statut=${statut},
                                    dateFrom=${dateFrom},dateTo=${dateTo},scope=${scope},
                                    sort='id',dir=${dir=='asc'?'desc':'asc'})}"
                                >
                                    <i class="fas fa-hashtag me-2 icon-gradient-light-blue"></i>
                                    N° de la demande
                                </a>
                            </th>

                            <!-- Tri dateDemande -->
                            <th>
                                <a class="text-decoration-none text-dark"
                                   th:href="@{/demande/list(page=0,size=${size},
                                    num=${num},demandeur=${demandeur},type=${type},statut=${statut},
                                    dateFrom=${dateFrom},dateTo=${dateTo},scope=${scope},
                                    sort='dateDemande',dir=${dir=='asc'?'desc':'asc'})}"
                                >
                                    <i class="far fa-clock me-2 icon-gradient-light-blue"></i>
                                    Date Demande
                                </a>
                            </th>

                            <th th:if="${showDemandeurColumn}">
                                <i class="far fa-user me-2 icon-gradient-light-blue"></i>Demandeur
                            </th>
                            <th sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_MOYENS_GENERAUX')"><i class="fas fa-tags me-2 icon-gradient-light-blue"></i>Type de demande</th>
                            <th>Priorité</th>
                            <th>Statut</th>
                        </tr>
                        </thead>

                        <tbody>
                        <!-- Pageable -->
                        <tr th:each="demande : ${demandesMeres.content}"
                            class="clickable-row"
                            th:attr="data-href=@{/demande/fiche/{id}(id=${demande.id})}">

                            <td th:text="${demande.id}"></td>
                            <td th:text="${#temporals.format(demande.dateDemande, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:if="${showDemandeurColumn}">
                                <div th:if="${demande.demandeur != null}">

                                    <!-- Nom + prénom -->
                                    <div class="fw-semibold"
                                         th:text="${demande.demandeur.nom + ' ' + demande.demandeur.prenom}">
                                    </div>

                                    <!-- Poste + Service -->
                                    <small class="text-muted"
                                           th:text="${
                                           (demande.demandeur.poste != null ? demande.demandeur.poste.poste : '') +
                                           (demande.demandeur.service != null ? ' - ' + demande.demandeur.service.acronyme : '')
                                       }">
                                    </small>

                                </div>

                                <span th:if="${demande.demandeur == null}">-</span>
                            </td>


                            <td sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_MOYENS_GENERAUX')"
                                class="td-nature-demande"
                                th:text="${demande.natureDemande != null ? demande.natureDemande : '-'}">
                            </td>
                            <td th:text="${demande.priorite != null ? demande.priorite : '-'}"></td>
                            <td>
                              <span class="badge-status"
                                    th:classappend="
                                      ${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).CREE} ? ' badge-wait' :
                                      (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDATION_N1} ? ' badge-info' :
                                      (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDATION_N2} ? ' badge-purple' :
                                      (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDATION_N3} ? ' badge-purple' :
                                      (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDE} ? ' badge-success' :
                                      (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).REFUSE} ? ' badge-danger' : ' badge-info')))))">

                                <i class="fas"
                                   th:classappend="
                                     ${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).CREE} ? ' fa-user-clock' :
                                     (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDATION_N1} ? ' fa-clipboard-check' :
                                     (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDATION_N2} ? ' fa-coins' :
                                     (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDATION_N3} ? ' fa-gavel' :
                                     (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).VALIDE} ? ' fa-check-circle' :
                                     (${demande.statut == T(afg.achat.afgApprovAchat.model.util.StatutDemande).REFUSE} ? ' fa-stop-circle-o' : ' fa-info-circle')))))">

                                </i>
                                <span th:text="${statutLabels[demande.statut] ?: 'INCONNU'}"></span>
                              </span>
                            </td>
                        </tr>

                        <tr th:if="${demandesMeres.totalElements == 0}">
                            <td class="text-center text-muted py-4"
                                th:colspan="${(showDemandeurColumn?1:0) + (#authorization.expression('hasAnyRole(''ROLE_ADMIN'',''ROLE_MOYENS_GENERAUX'')')?1:0) + 3}">
                                Aucune demande trouvée
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <nav th:if="${demandesMeres.totalPages > 1}" class="mt-3" aria-label="Pagination demandes">
                    <ul class="pagination justify-content-center mb-0">

                        <!-- Précédente -->
                        <li class="page-item" th:classappend="${demandesMeres.first} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/demande/list(page=${demandesMeres.number - 1}, size=${size},
    num=${num},demandeur=${demandeur},type=${type},statut=${statut},
    dateFrom=${dateFrom},dateTo=${dateTo},scope=${scope},
    sort=${sort},dir=${dir})}"
                            >
                                Précédente
                            </a>
                        </li>

                        <!-- Pages autour -->
                        <th:block th:with="
            start=${T(java.lang.Math).max(0, demandesMeres.number - 2)},
            end=${T(java.lang.Math).min(demandesMeres.totalPages - 1, demandesMeres.number + 2)}
        ">
                            <li class="page-item"
                                th:each="p : ${#numbers.sequence(start, end)}"
                                th:classappend="${p == demandesMeres.number} ? 'active'">
                                <a class="page-link"
                                   th:href="@{/demande/list(page=${p}, size=${size},
    num=${num},demandeur=${demandeur},type=${type},statut=${statut},
    dateFrom=${dateFrom},dateTo=${dateTo},scope=${scope},
    sort=${sort},dir=${dir})}"
                                   th:text="${p + 1}"
                                >
                                </a>
                            </li>
                        </th:block>

                        <!-- Suivante -->
                        <li class="page-item" th:classappend="${demandesMeres.last} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/demande/list(page=${demandesMeres.number + 1}, size=${size},
    num=${num},demandeur=${demandeur},type=${type},statut=${statut},
    dateFrom=${dateFrom},dateTo=${dateTo},scope=${scope},
    sort=${sort},dir=${dir})}"
                            >
                                Suivante
                            </a>
                        </li>

                    </ul>

                    <div class="text-center text-muted small mt-2">
                        Page <span th:text="${demandesMeres.number + 1}"></span> /
                        <span th:text="${demandesMeres.totalPages}"></span>
                        — Total: <span th:text="${demandesMeres.totalElements}"></span>
                    </div>
                </nav>

            </div>
        </div>
    </section>
</div>
<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("tr.clickable-row").forEach(row => {
            row.addEventListener("click", (e) => {
                // Si on clique sur un lien/bouton/input à l'intérieur, on laisse le comportement normal
                if (e.target.closest("a, button, input, select, textarea, label")) return;

                const href = row.getAttribute("data-href");
                if (!href) return;

                // Ctrl/Cmd click => nouvel onglet
                if (e.ctrlKey || e.metaKey) {
                    window.open(href, "_blank");
                } else {
                    window.location.href = href;
                }
            });
        });
    });
    /*]]>*/
</script>

</body>
</html>
