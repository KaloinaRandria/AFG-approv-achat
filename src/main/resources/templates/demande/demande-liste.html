<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Liste des demandes</title>
    <th:block th:insert="~{fragment/load_css :: load_css}"></th:block>
    <th:block th:insert="~{fragment/font :: font}"></th:block>
    <th:block th:insert="~{fragment/load_script :: load_script}"></th:block>
</head>
<body>
<div th:replace="~{fragment/sidebar :: sidebar}"></div>

<div class="main-content">
    <section>
        <div th:replace="~{fragment/load_pop_up :: pop_up}"></div>

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold text-gradient-blue">
                <i class="fas fa-list-ul icon-gradient-blue"></i> Liste des demandes
            </h1>
            <div>
                <a th:href="@{/demande/add}" class="btn btn-gradient-green">
                    <i class="fas fa-plus-circle me-1"></i> Nouvelle demande
                </a>
            </div>
        </div>

        <div class="card shadow-lg border-0 mb-3">
            <div class="card-body">

                <form method="get" th:action="@{/demande/list}" class="row g-2 align-items-end">
                    <input type="hidden" name="sort" th:value="${sort}">
                    <input type="hidden" name="dir" th:value="${dir}">

                    <!-- NÂ° demande -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">NÂ° demande</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-hashtag"></i></span>
                            <input class="form-control" type="text" name="num"
                                   th:value="${num}" placeholder="DM..." />
                        </div>
                    </div>

                    <!-- Demandeur -->
                    <div class="col-md-3">
                        <label class="form-label mb-1">Demandeur</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-user"></i></span>
                            <input class="form-control" type="text" name="demandeur"
                                   th:value="${demandeur}" placeholder="Nom / PrĂ©nom / Dept..." />
                        </div>
                    </div>

                    <!-- Type -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Type</label>
                        <select class="form-select" name="type">
                            <option value="" th:selected="${type == null || type == ''}">Tous</option>
                            <option value="OPEX" th:selected="${type == 'OPEX'}">OPEX</option>
                            <option value="CAPEX" th:selected="${type == 'CAPEX'}">CAPEX</option>
                        </select>
                    </div>

                    <!-- Statut -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Statut</label>
                        <select class="form-select" name="statut">
                            <option value="" th:selected="${statut == null || statut == ''}">Tous</option>
                            <option th:each="s : ${statuts}"
                                    th:value="${s.name()}"
                                    th:text="${s.name()}"
                                    th:selected="${statut == s.name()}">
                            </option>
                        </select>
                    </div>


                    <!-- Date dĂ©but -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Date dĂ©but</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-calendar"></i></span>
                            <input class="form-control" type="date" name="dateFrom" th:value="${dateFrom}">
                        </div>
                    </div>

                    <!-- Date fin -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">Date fin</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="far fa-calendar-check"></i></span>
                            <input class="form-control" type="date" name="dateTo" th:value="${dateTo}">
                        </div>
                    </div>

                    <!-- PortĂ©e -->
                    <div class="col-md-2" th:if="${showDemandeurScopeFilter}">
                        <label class="form-label mb-1">
                            <i class="fas fa-users me-1"></i> PortĂ©e
                        </label>
                        <select class="form-select" name="scope">
                            <option value="ALL" th:selected="${scope == 'ALL'}">Tous</option>
                            <option value="ME" th:selected="${scope == 'ME'}">Mes demandes</option>
                            <option value="CHILDREN" th:selected="${scope == 'CHILDREN'}">Mes enfants</option>
                        </select>
                    </div>

                    <!-- Taille (âš ď¸Ź pas d'auto-submit si tu veux appliquer avec Filtrer) -->
                    <div class="col-md-2">
                        <label class="form-label mb-1">
                            <i class="fas fa-list-ol me-1"></i> Taille
                        </label>
                        <select class="form-select" name="size">
                            <option th:value="10" th:selected="${size == 10}">10</option>
                            <option th:value="25" th:selected="${size == 25}">25</option>
                            <option th:value="50" th:selected="${size == 50}">50</option>
                            <option th:value="100" th:selected="${size == 100}">100</option>
                        </select>
                    </div>

                    <!-- Boutons -->
                    <div class="col-md-1">
                        <label class="form-label mb-1 d-none d-md-block">&nbsp;</label>
                        <button class="btn btn-gradient-blue w-100" type="submit" title="Filtrer">
                            <i class="fas fa-filter"></i>
                        </button>
                    </div>

                    <div class="col-md-1">
                        <label class="form-label mb-1 d-none d-md-block">&nbsp;</label>
                        <a class="btn btn-outline-secondary w-100" th:href="@{/demande/list}" title="RĂ©initialiser">
                            RĂ©initialiser
                        </a>
                    </div>
                </form>

            </div>
        </div>

        <!-- âś… CARD TABLEAU -->
        <div class="card shadow-lg border-0">
            <div class="card-body">

                <!-- total -->
                <div class="text-end text-muted small mb-2">
                    <span th:text="${demandesMeres.totalElements}"></span> ligne(s)
                </div>

                <!-- Tableau -->
                <div class="table-responsive">
                    <table id="demandeTable" class="table table-striped table-hover table-bordered dt-head-gradient">
                        <thead>
                        <tr>
                            <!-- âś… Tri ID -->
                            <th>
                                <a class="text-decoration-none text-dark"
                                   th:href="@{/demande/list(page=0,size=${size},
    num=${num},demandeur=${demandeur},type=${type},statut=${statut},
    dateFrom=${dateFrom},dateTo=${dateTo},scope=${scope},
    sort='id',dir=${dir=='asc'?'desc':'asc'})}"
                                >
                                    <i class="fas fa-hashtag me-2 icon-gradient-light-blue"></i>
                                    NÂ° de la demande
                                </a>
                            </th>

                            <!-- âś… Tri dateDemande -->
                            <th>
                                <a class="text-decoration-none text-dark"
                                   th:href="@{/demande/list(page=0,size=${size},
    num=${num},demandeur=${demandeur},type=${type},statut=${statut},
    dateFrom=${dateFrom},dateTo=${dateTo},scope=${scope},
    sort='dateDemande',dir=${dir=='asc'?'desc':'asc'})}"
                                >
                                    <i class="far fa-clock me-2 icon-gradient-light-blue"></i>
                                    Date Demande
                                </a>
                            </th>

                            <th th:if="${showDemandeurColumn}">
                                <i class="far fa-user me-2 icon-gradient-light-blue"></i>Demandeur
                            </th>
                            <th sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_MOYENS_GENERAUX')"><i class="fas fa-tags me-2 icon-gradient-light-blue"></i>Type de demande</th>
                            <th>Statut</th>
                            <th class="text-center"><i class="fas fa-cogs me-2 icon-gradient-light-blue"></i>Action</th>
                        </tr>
                        </thead>

                        <tbody>
                        <!-- âś… Pageable -->
                        <tr th:each="demande : ${demandesMeres.content}">
                            <td th:text="${demande.id}"></td>
                            <td th:text="${#temporals.format(demande.dateDemande, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:if="${showDemandeurColumn}"
                                th:text="${demande.demandeur.nom + ' ' + demande.demandeur.prenom + ' (' + demande.demandeur.departement.acronyme+ ')'}">
                            </td>
                            <td sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_MOYENS_GENERAUX')"
                                class="td-nature-demande"
                                th:text="${demande.natureDemande != null ? demande.natureDemande : '-'}">
                            </td>
                            <td th:text="${demande.statutDemande}"></td>
                            <td class="text-center">
                                <button type="button"
                                        class="btn btn-sm btn-view-demandeDetails"
                                        data-bs-toggle="modal"
                                        data-bs-target="#demandeDetailsModal"
                                        th:data-id="${demande.id}"
                                        title="Voir la demande">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                        </tr>

                        <tr th:if="${demandesMeres.totalElements == 0}">
                            <td colspan="6" class="text-center text-muted py-4">
                                Aucune demande trouvĂ©e
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- âś… Pagination -->
                <nav th:if="${demandesMeres.totalPages > 1}" aria-label="Pagination demandes" class="mt-3 dt-pagination stock-pagination">
                    <ul class="pagination justify-content-center">

                        <li class="page-item" th:classappend="${demandesMeres.first} ? ' disabled' : ''">
                            <a class="page-link"
                               th:href="@{/demande/list(page=${demandesMeres.number - 1},size=${size},q=${q},
                                         dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}">
                                &laquo;
                            </a>
                        </li>

                        <li class="page-item"
                            th:each="p : ${#numbers.sequence(0, demandesMeres.totalPages - 1)}"
                            th:if="${p >= demandesMeres.number - 2 and p <= demandesMeres.number + 2}"
                            th:classappend="${p == demandesMeres.number} ? ' active' : ''">
                            <a class="page-link"
                               th:href="@{/demande/list(page=${p},size=${size},q=${q},
                                         dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}"
                               th:text="${p + 1}"></a>
                        </li>

                        <li class="page-item" th:classappend="${demandesMeres.last} ? ' disabled' : ''">
                            <a class="page-link"
                               th:href="@{/demande/list(page=${demandesMeres.number + 1},size=${size},q=${q},
                                         dateFrom=${dateFrom},dateTo=${dateTo},sort=${sort},dir=${dir})}">
                                &raquo;
                            </a>
                        </li>
                    </ul>

                    <div class="text-center text-muted small">
                        Page <span th:text="${demandesMeres.number + 1}"></span> /
                        <span th:text="${demandesMeres.totalPages}"></span>
                    </div>
                </nav>

            </div>
        </div>
    </section>
</div>

<div class="modal fade" id="demandeDetailsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content bl-document">

            <!-- EN-TĂŠTE DOCUMENT -->
            <div class="bl-header">
                <div class="bl-company">
                    <img th:src="@{/img/logo_afg.png}" alt="Logo" height="60">
                </div>
                <div class="bl-title">
                    <h3>DEMANDE DE MATERIEL</h3>
                    <span>RĂ©ference : <strong id="modalDemandeId"></strong></span>
                </div>
            </div>

            <!-- INFOS GĂ‰NĂ‰RALES -->
            <div class="bl-infos">
                <div>
                    <strong>Demandeur :</strong>
                    <div id="modalDemandeDemandeur"></div>
                </div>
                <div>
                    <strong>Date :</strong>
                    <div id="modalDemandeDate"></div>
                </div>
                <div>
                    <strong>Statut :</strong>
                    <div id="modalDemandeStatut"></div>
                </div>
                <div>
                    <strong>Type de Demande :</strong>

                    <!-- Lecture seule (tout le monde) -->
                    <div id="modalDemandeNatureText"></div>

                    <!-- Edition (MG/Admin uniquement) -->
                    <div sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_MOYENS_GENERAUX')" class="mt-2">
                        <select id="modalDemandeNatureSelect" class="form-select form-select-sm">
                            <option value="">-- Choisir --</option>
                            <option th:each="n : ${natures}"
                                    th:value="${n.name()}"
                                    th:text="${n.name()}">
                            </option>
                        </select>


                        <button id="btnSaveNature" type="button" class="btn btn-sm btn-gradient-blue mt-3">
                            Enregistrer
                        </button>


                        <div id="natureSaveMsg" class="small mt-1"></div>
                    </div>
                </div>

            </div>

            <!-- TABLE ARTICLES -->
            <div class="bl-body">
                <table class="bl-table">
                    <thead>
                    <tr>
                        <th style="width: 70%">DĂ‰SIGNATION</th>
                        <th style="width: 30%" class="text-end">QUANTITĂ‰</th>
                    </tr>
                    </thead>
                    <tbody id="modalDemandeArticles">
                    <tr>
                        <td colspan="2" class="text-center text-muted">
                            Chargement...
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer bl-footer">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
                    Fermer
                </button>
            </div>

        </div>
    </div>
</div>
<script th:inline="none">
    /*<![CDATA[*/
    const formatQte = new Intl.NumberFormat('fr-FR', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
    });

    let currentDemandeId = null;
    let $currentRow = null;

    document.addEventListener('DOMContentLoaded', () => {

        // Ouvrir le modal + charger dĂ©tails
        $('#demandeTable').on('click', '.btn-view-demandeDetails', function () {
            const demandeId = $(this).data('id');
            currentDemandeId = demandeId;
            $currentRow = $(this).closest('tr');

            // reset modal
            $('#modalDemandeId').text(demandeId);
            $('#modalDemandeDemandeur').text('');
            $('#modalDemandeDate').text('');
            $('#modalDemandeStatut').text('');
            $('#modalDemandeNatureText').text('');
            $('#modalDemandeNatureSelect').val('');
            $('#natureSaveMsg').text('').removeClass('text-danger text-success');
            $('#modalDemandeArticles').html('<tr><td colspan="2" class="text-center text-muted">Chargement...</td></tr>');

            $.ajax({
                url: '/api/demande/' + demandeId + '/details',
                method: 'GET',
                success: function (data) {

                    $('#modalDemandeId').text(data.id ?? '-');
                    $('#modalDemandeDemandeur').text(data.demandeur ?? '-');
                    $('#modalDemandeStatut').text(data.statutDemande ?? '-');

                    // âś… Type demande: texte + prĂ©selection select
                    const type = (data.typeDemande ?? '').toString().trim(); // "OPEX" / "CAPEX" / ""
                    $('#modalDemandeNatureText').text(type !== '' ? type : '-');
                    $('#modalDemandeNatureSelect').val(type); // si "" => revient sur option value=""

                    // date format
                    if (data.dateDemande) {
                        const dateObj = new Date(data.dateDemande);
                        const day = String(dateObj.getDate()).padStart(2, '0');
                        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
                        const year = dateObj.getFullYear();
                        const hours = String(dateObj.getHours()).padStart(2, '0');
                        const minutes = String(dateObj.getMinutes()).padStart(2, '0');
                        $('#modalDemandeDate').text(`${day}/${month}/${year} ${hours}:${minutes}`);
                    } else {
                        $('#modalDemandeDate').text('-');
                    }

                    // lignes
                    if (data.articles && data.articles.length > 0) {
                        let rows = '';
                        data.articles.forEach(a => {
                            const qte = Number(String(a.quantite).replace(/\s/g, '').replace(',', '.'));
                            rows += `<tr>
              <td>${a.designation ?? '-'}</td>
              <td class="text-end">${formatQte.format(isNaN(qte) ? 0 : qte)}</td>
            </tr>`;
                        });
                        $('#modalDemandeArticles').html(rows);
                    } else {
                        $('#modalDemandeArticles').html('<tr><td colspan="2" class="text-center text-muted">Aucun article</td></tr>');
                    }
                },
                error: function () {
                    $('#modalDemandeArticles').html('<tr><td colspan="2" class="text-center text-danger">Erreur de chargement</td></tr>');
                }
            });
        });

        // Enregistrer type demande (PUT)
        $('#btnSaveNature').on('click', function () {
            const val = $('#modalDemandeNatureSelect').val(); // "OPEX" / "CAPEX" / ""

            $.ajax({
                url: `/api/demande/${currentDemandeId}/type-demande`,
                method: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({ typeDemande: val }),
                success: function () {
                    $('#natureSaveMsg').text('Type de demande enregistrĂ©')
                        .removeClass('text-danger').addClass('text-success');

                    // Mise Ă  jour dans le modal
                    $('#modalDemandeNatureText').text(val ? val : '-');

                    // Mise Ă  jour dans la table
                    if ($currentRow) {
                        $currentRow.find('.td-nature-demande').text(val ? val : '-');
                    }
                },
                error: function (xhr) {
                    const msg = xhr.responseText ? xhr.responseText : 'Erreur';
                    $('#natureSaveMsg').text(msg).removeClass('text-success').addClass('text-danger');
                }
            });
        });

    });
    /*]]>*/
</script>
</body>
</html>
